<!DOCTYPE html>
<html>
<head>

<title>Donate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(120deg,#84fab0,#8fd3f4);
}

.donate-card{
border-radius:20px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card donate-card p-5 shadow text-center">

<h2>💖 Help {{ case.patient }}</h2>

<p><b>Hospital:</b> {{ case.hospital }}</p>

<p><b>Required Amount:</b> ₹{{ case.amount }}</p>

<hr>

<form method="POST">

<input type="number" name="donate_amount"
class="form-control mb-3"
placeholder="Enter amount you want to donate"
required>

<button class="btn btn-success">
Generate Payment QR
</button>

</form>

{% if qr %}

<hr>

<h4>Scan QR to Pay</h4>

<img src="/{{ qr }}" width="250">

<p class="text-dark mt-2">
Use Google Pay / PhonePe / Paytm
</p>

{% endif %}

<a href="/" class="btn btn-primary mt-3">
Back Home
</a>

</div>

</div>

</body>
</html>
