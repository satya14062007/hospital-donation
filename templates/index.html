<!DOCTYPE html>
<html>
<head>
<title>Hospital Donation Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(120deg,#89f7fe,#66a6ff);
min-height:100vh;
font-family:Arial;
}

.navbar{
background:#0d6efd;
}

.navbar-brand{
color:white !important;
font-weight:bold;
font-size:22px;
}

.hero{
text-align:center;
margin-top:120px;
color:white;
}

.hero h1{
font-size:50px;
font-weight:bold;
}

.hero p{
font-size:18px;
}

.btn-custom{
padding:15px;
font-size:18px;
margin:10px;
width:250px;
border-radius:30px;
transition:0.3s;
}

.btn-custom:hover{
transform:scale(1.05);
}

footer{
margin-top:150px;
text-align:center;
color:white;
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand">💖 Hospital Donation Platform</a>
</div>
</nav>

<div class="hero">

<h1>Save Lives Together</h1>

<p>Support needy patients by donating directly to hospitals</p>

<br>

<a href="/hospital/register" class="btn btn-light btn-custom">
🏥 Register Hospital
</a>

<br>

<a href="/case/create" class="btn btn-success btn-custom">
➕ Create Patient Case
</a>

<br>

<a href="/cases" class="btn btn-warning btn-custom">
📄 View Patient Cases
</a>

</div>

<footer>

<p>© 2026 SmartMedPay | Built for Social Good</p>

</footer>

</body>
</html>
